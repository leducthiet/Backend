<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý liên lệ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/c7788420e7.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.1/css/dataTables.bootstrap4.min.css">

    <script src="https://cdn.datatables.net/1.13.1/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.1/js/dataTables.bootstrap4.min.js"></script>
</head>
<body>
<div class="container-fluid " style="height: 100vh; padding: 0;">
    <div th:replace="fragments/headerAdmin :: header">...</div>

    <div class="row" style="height: 92%; margin: 0;">
        <div th:replace="fragments/sideBarAdmin :: sidebar">...</div>

        <div class="col" style="border-top: none; box-sizing: border-box;" id="viewcontent">
            <h2 class="mt-3 pb-3 border-bottom mb-3" style="font-weight: 400;">Danh sách liên hệ</h2>


            <div class="card">
                <div class="card-body">
                    <table id="accountTable" class="table table-striped table-bordered table-hover">
                        <thead>
                        <tr>
                            <th style="width: 10%">ID</th>
                            <th style="width: 15%">Ngày tạo</th>
                            <th style="width: 15%">Tên người gửi</th>
                            <th style="width: 40%">Nội dung</th>
                            <th style="width: 20%">Hành động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each ="contact : ${contacts}">
                            <td th:utext="${contact.id}">...</td>
                            <td th:utext="${#dates.format(contact.createdDate, 'yyyy-MM-dd')}">...</td>
                            <td th:utext="${contact.name}">...</td>
                            <td th:utext="${contact.content}">...</td>
                            <td>
                                <button type="button" class="btn btn-warning" data-toggle="modal" th:attr="data-target='#xem'+${contact.id}">Xem</button>

                                <!-- Modal -->
                                <div class="modal  fade bd-example-modal-lg"  th:id="'xem' + ${contact.id}"  tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
                                    <div class="modal-dialog modal-lg" role="document">
                                        <div class="modal-content">
                                            <div class="modal-header">
                                                <h5 class="modal-title">Thông tin liên hệ</h5>
                                                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                                    <span aria-hidden="true">&times;</span>
                                                </button>
                                            </div>
                                            <form method="post">
                                                <div class="modal-body">
                                                    <div class="form-group">
                                                        <label>Mã liên hệ</label>
                                                        <input type="text" class="form-control" th:value="${contact.id}" readonly>
                                                    </div>
                                                    <div class="form-group">
                                                        <label>Ngày tạo</label>
                                                        <input type="text" class="form-control" th:value="${#dates.format(contact.createdDate, 'yyyy-MM-dd')}" readonly>
                                                    </div>

                                                    <div class="form-group">
                                                        <label>Tên người gửi</label>
                                                        <input type="text" class="form-control" th:value="${contact.name}" readonly>

                                                    </div>

                                                    <div class="form-group">
                                                        <label>Email</label>
                                                        <input type="text" class="form-control" th:value="${contact.email}" readonly>
                                                    </div>

                                                    <div class="form-group">
                                                        <label>Số điện thoại</label>
                                                        <input type="text" class="form-control" th:value="${contact.phone}" readonly>
                                                    </div>

                                                    <div class="form-group">
                                                        <label>Nội dung</label>
                                                        <textarea class="form-control" rows="3" th:utext="${contact.content}" readonly></textarea>
                                                    </div>

                                                </div>
                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Đóng</button>
                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                </div>

                                <!-- Button trigger modal -->
                                <button type="button" class="btn btn-danger" data-toggle="modal" th:attr="data-target='#xoa'+${contact.id}">
                                    Xóa
                                </button>

                                <!-- Modal -->
                                <div class="modal fade" th:id="'xoa' + ${contact.id}" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
                                    <div class="modal-dialog" role="document">
                                        <div class="modal-content">
                                            <div class="modal-header">
                                                <h5 class="modal-title" id="xoamodel">Xóa</h5>
                                                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                                    <span aria-hidden="true">&times;</span>
                                                </button>
                                            </div>

                                            <form method="post" action="deleteContact" modelAttribute="contact">
                                                <input type="hidden"  name="id" th:value="${contact.id}">




                                                <div class="modal-body">
                                                    Bạn có chắc chắn muốn xóa thông tin này ?

                                                </div>
                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Hủy</button>
                                                    <button type="submit" class="btn btn-primary">Xóa</button>

                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                </div>

                            </td>
                        </tr>

                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="js/dataTable.js"></script>
<script src="js/validateBootstrap.js"></script>

</body>
</html>
