<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt tour</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/c7788420e7.js" crossorigin="anonymous"></script>


</head>
<body>
<div th:replace="fragments/header :: header">...</div>
<div class="container mt-3 pt-5 mb-5">
    <form method="post" action="/submitOrder" modelAttribute="tourBooking">
        <input type="hidden" name="tourId" th:value="${tour.id}">
        <input type="hidden" name="totalPrice" value="0" id="totalPrice">
        <div class="row">
            <div class="col-12">
                <div class="card mt-3 ">
                    <div class="card-header">
                        <h5>Giá vé</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${ErrorMessage}" th:utext="${ErrorMessage}"
                             style="color:red;font-style:italic;"></div>
                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label>Nguời lớn (<span class="giave" th:text="${tour.priceAdult}"></span> VNĐ)</label>
                                <input type="text" id="quantityNguoilon" class="form-control inputQuantity" value="0" name="quantityAdult">
                            </div>
                            <div class="form-group col-md-4">
                                <label>Trẻ em từ  5 đến 11 tuổi (<span class="giave" th:text="${tour.priceChild5To11}"></span> VNĐ)</label>
                                <input type="text" class="form-control inputQuantity" value="0" name="quantityChild5To11">
                            </div>
                            <div class="form-group col-md-4">
                                <label>Trẻ em dưới 5 tuổi (<span class="giave" th:text="${tour.priceChild2To5}"></span> VNĐ)</label>
                                <input type="text" class="form-control inputQuantity" value="0" name="quantityChild2To5">
                            </div>

                        </div>

                        <h5 class="text-right">Tổng tiền : <span id="tongtien" class="h4 text-primary">0</span> VNĐ</h5>

                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card mt-3 ">
                    <div class="card-header">
                        <h5>Thông tin khách hàng</h5>
                    </div>
                    <div class="card-body">
                        <div class="form-group row">
                            <label class="col-sm-2 col-form-label">Ngày khởi hành</label>
                            <div class="col-sm-6">
                                <select class="form-control" name="tourDateBookingId">
                                    <option th:each="tourDateBooking : ${tourDateBookings}" th:value="${tourDateBooking.id}" th:text="${#dates.format(tourDateBooking.dateBooking, 'yyyy-MM-dd')}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group row">
                            <label class="col-sm-2 col-form-label">Họ và tên</label>
                            <div class="col-sm-6">
                                <input type="text" class="form-control" name="customerName">
                                <div th:if="${ErrorMessageName}" th:utext="${ErrorMessageName}"
                                     style="color:red;font-style:italic;"></div>
                            </div>
                        </div>

                        <div class="form-group row">
                            <label class="col-sm-2 col-form-label">Số điện thoại</label>
                            <div class="col-sm-6">
                                <input type="text" class="form-control" name="customerPhone">
                                <div th:if="${ErrorMessagePhone}" th:utext="${ErrorMessagePhone}"
                                     style="color:red;font-style:italic;"></div>
                            </div>
                        </div>

                        <div class="form-group row">
                            <label class="col-sm-2 col-form-label">Email</label>
                            <div class="col-sm-6">
                                <input type="text" class="form-control" name="customerEmail">
                                <div th:if="${ErrorMessageEmail}" th:utext="${ErrorMessageEmail}"
                                     style="color:red;font-style:italic;"></div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card mt-3 ">
                    <div class="card-header">
                        <h5>Phương thức thanh toán</h5>
                    </div>
                    <div class="card-body">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="paymentMethod" id="exampleRadios1" value="1" checked>
                            <label class="form-check-label" for="exampleRadios1">
                                Thanh toán trực tiếp tại công ty
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="paymentMethod" id="exampleRadios2" value="2">
                            <label class="form-check-label" for="exampleRadios2">
                                Thanh toán qua Paypal
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg btn-block mt-3">Thanh toán</button>
                    </div>
                </div>
            </div>
        </div>
    </form>


</div>

<script>
    const inputQuantity = document.getElementsByClassName("inputQuantity");
    for (let e of inputQuantity) {
        e.onchange = function(){
        const tinhtien = document.getElementsByClassName("inputQuantity");
        var tongtien = 0
        const giave = document.getElementsByClassName("giave");
        var i = 0;

        for (el of tinhtien) {
            tongtien += parseInt(el.value) * parseInt(giave[i].innerHTML)
            i++
        }
        document.getElementById("tongtien").innerHTML = tongtien
        document.getElementById("totalPrice").value = tongtien
    };
    }


</script>

</body>
</html>
