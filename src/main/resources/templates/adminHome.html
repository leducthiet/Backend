<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
  <script src="https://kit.fontawesome.com/c7788420e7.js" crossorigin="anonymous"></script>
</head>
<body>
<div class="container-fluid " style="height: 100vh; padding: 0;">
  <nav class="navbar navbar-expand-lg navbar-light bg-light border border-gray" style="width: 100%; height: 8%;">
    <a class="navbar-brand" href="#" style="font-size: 1rem; padding: 0;">Quản lý</a>

    <div class="collapse navbar-collapse " id="navbarSupportedContent">

      <ul class="navbar-nav ml-auto d-flex justify-content-end">
        <li class="nav-item dropdown" style="display: inline; float: right;">
          <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-toggle="dropdown"
             aria-haspopup="true" aria-expanded="false" style="padding: 0;">
            <i class="fa fa-user" aria-hidden="true"></i>
          </a>
          <div class="dropdown-menu dropdown-menu-right" aria-labelledby="dropdownMenuButton">
            <a class="dropdown-item" href="profile.html">
              <i class="fa fa-user" aria-hidden="true"></i>
              Thông tin cá nhân
            </a>
            <a class="dropdown-item" href="login.html">
              <i class="fas fa-sign-out"></i>
              Đăng xuất
            </a>
          </div>
        </li>
      </ul>
    </div>
  </nav>

  <div class="row" style="height: 92%; margin: 0;">
    <div class="col-2.5 bg-light border border-gray" style="border-top: none;">
      <div class="card bg-light" style="border: none;">
        <div class="card-body">
          <div class="form-group" style="margin-bottom: 0;">
            <div class="input-group input-group-sm">
              <input type="text" class="form-control form-control-sm" name="search" placeholder="Tìm kiếm" />
              <div class="input-group-append">
                <button type="button" class="btn bg-white btn-sm border border-gray">
                  <i class="fa-solid fa-magnifying-glass"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <ul class="list-group ">
        <li class="list-group-item bg-light" style="border-radius: 0;">
          <i class="fa-solid fa-plane-departure text-primary"></i>
          <a href="/tour" style="text-decoration: none; ">Tour</a>
        </li>
        <li class="list-group-item bg-light" style="border-radius: 0;">
          <i class="fa-sharp fa-solid fa-location-dot text-primary"></i>
          <a href="/province" style="text-decoration: none; ">Địa điểm</a>
        </li>
        <li class="list-group-item bg-light" style="border-radius: 0;">
          <i class="fa-solid fa-umbrella-beach text-primary"></i>
          <a href="/tourType" style="text-decoration: none; ">Chủ đề tour</a>
        </li>
      </ul>

    </div>

    <div class="col" style="border-top: none; box-sizing: border-box;" id="viewcontent">
      <h2 class="mt-3 pb-3 border-bottom mb-3" style="font-weight: 400;">Danh sách Tour</h2>
      <button type="button" class="btn btn-success mb-3" data-toggle="modal" data-target="#exampleModal">Thêm Tour</button>

      <!-- Modal -->
      <div class="modal fade bd-example-modal-lg" id="exampleModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg" role="document">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="exampleModalLabel">Thêm Tour</h5>
              <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                <span aria-hidden="true">&times;</span>
              </button>
            </div>
            <form method="post" action="createTour" modelAttribute="tour" enctype="multipart/form-data">
            <div class="modal-body">
                <div class="form-row">
                  <div class="form-group col-md-6">
                    <label for="inputEmail4">Tên tour</label>
                    <input type="text" class="form-control" id="inputEmail4" placeholder="" name="tourName">
                  </div>
                  <div class="form-group col-md-2">
                    <label for="inputPassword4">Số du khách</label>
                    <input type="text" class="form-control" id="inputPassword5" placeholder="" name="totalPeople">
                  </div>
                  <div class="form-group col-md-2">
                    <label for="inputPassword4">Thời gian(ngày)</label>
                    <input type="text" class="form-control" id="inputPassword4" placeholder="" name="duration">
                  </div>

                </div>

                <div class="form-row">
                  <div class="form-group col-md-6">
                    <label >Chủ đề</label>
                    <select class="form-control" id="tourType" name="tourType_id">
                      <option disabled selected>--Chọn chủ đề--</option>
                      <option th:each="tourType : ${tourTypes}" th:value="${tourType.id}" th:text="${tourType.name}"></option>
                    </select>
                  </div>

                  <div class="form-group col-md-6">
                    <label for="inputAddress">Lịch trình</label>
                    <input type="text" class="form-control" id="inputAddress" placeholder="" name="schedule">
                  </div>

                </div>




                <div class="form-group">
                  <label for="inputAddress2">Mô tả</label>
                  <input type="text" class="form-control" id="inputAddress2" placeholder="" name="description">
                </div>
                <div class="form-row">
                  <div class="form-group col-md-4">
                    <label >Giá vé cho người lớn</label>
                    <input type="text" class="form-control" name="priceAdult">
                  </div>

                  <div class="form-group col-md-4">
                    <label >Giá vé cho trẻ em dưới 5 tuổi</label>
                    <input type="text" class="form-control" name="priceChild2To5">
                  </div>
                  <div class="form-group col-md-4">
                    <label >Giá vé cho trẻ em dưới 11 tuổi</label>
                    <input type="text" class="form-control" name="priceChild5To11">
                  </div>

                </div>

                <div class="form-row">
                  <div class="form-group col-md-6">
                    <label >Địa điểm</label>
                    <select class="form-control" id="province" name="province_id">
                      <option disabled selected>--Chọn địa điểm--</option>
                      <option th:each="province : ${provinces}" th:value="${province.id}" th:text="${province.name}"></option>
                    </select>
                  </div>


                </div>


              <div class="form-group">
                <label for="inputAddress2">Thumbnail</label>
                <input type="file" name="thumbnail">
              </div>

                <div class="form-group">
                  <label for="inputAddress2">Hình ảnh</label>
                  <input type="file" name="images" multiple="multiple">
                </div>



            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-dismiss="modal">Đóng</button>
              <button type="submit" class="btn btn-primary">Thêm</button>
            </div>
          </form>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          Danh sách Tour
        </div>
        <div class="card-body">
          <table class="table table-sm table-bordered table-striped" >
            <thead>
            <tr>
              <th style="width: 10%">#</th>
              <th style="width: 40%">Tên Tour</th>
              <th style="width: 30%">Hình ảnh</th>
              <th style="width: 20%">Hàng động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each ="tour : ${tours}">
              <td th:utext="${tour.id}">...</td>
              <td th:utext="${tour.tourName}">...</td>
              <td> <img class="img-thumbnail" th:src="@{'api/get-image?url=' + ${tour.thumbnailPath}}"/> </td>
              <td>
                <button type="button" class="btn btn-warning" data-toggle="modal" th:attr="data-target='#sua'+${tour.id}">Sửa</button>

                <div class="modal fade bd-example-modal-lg" th:id="'sua' + ${tour.id}" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
                  <div class="modal-dialog modal-lg" role="document">
                    <div class="modal-content">
                      <div class="modal-header">
                        <h5 class="modal-title" id="exampleModalLabel1">Sửa Tour</h5>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                          <span aria-hidden="true">&times;</span>
                        </button>
                      </div>


                      <form method="post" action="updateTour" modelAttribute="tour" enctype="multipart/form-data">
                        <input type="hidden" name="id" th:value="${tour.id}">
                        <div class="modal-body">
                          <div class="form-row">
                            <div class="form-group col-md-6">
                              <label for="inputEmail4">Tên tour</label>
                              <input type="text" class="form-control" placeholder="" name="tourName" th:value="${tour.tourName}">
                            </div>
                            <div class="form-group col-md-2">
                              <label for="inputPassword4">Số du khách</label>
                              <input type="text" class="form-control"  placeholder="" name="totalPeople" th:value="${tour.totalPeople}">
                            </div>
                            <div class="form-group col-md-2">
                              <label for="inputPassword4">Thời gian(ngày)</label>
                              <input type="text" class="form-control"  placeholder="" name="duration" th:value="${tour.duration}">
                            </div>

                          </div>

                          <div class="form-row">
                            <div class="form-group col-md-6">
                              <label >Chủ đề</label>
                              <select class="form-control"  name="tourType_id">
                                <option th:each="tourType : ${tourTypes}" th:value="${tourType.id}" th:text="${tourType.name} " th:selected="${tourType.id} == ${tour.tourType.id}"></option>
                              </select>
                            </div>

                            <div class="form-group col-md-6">
                              <label for="inputAddress">Lịch trình</label>
                              <input type="text" class="form-control"  placeholder="" name="schedule" th:value="${tour.schedule}">
                            </div>

                          </div>




                          <div class="form-group">
                            <label for="inputAddress2">Mô tả</label>
                            <input type="text" class="form-control"  placeholder="" name="description" th:value="${tour.description}">
                          </div>
                          <div class="form-row">
                            <div class="form-group col-md-4">
                              <label >Giá vé cho người lớn</label>
                              <input type="text" class="form-control" name="priceAdult" th:value="${tour.priceAdult}">
                            </div>

                            <div class="form-group col-md-4">
                              <label >Giá vé cho trẻ em dưới 5 tuổi</label>
                              <input type="text" class="form-control" name="priceChild2To5" th:value="${tour.priceChild2To5}">
                            </div>
                            <div class="form-group col-md-4">
                              <label >Giá vé cho trẻ em dưới 11 tuổi</label>
                              <input type="text" class="form-control" name="priceChild5To11" th:value="${tour.priceChild5To11}">
                            </div>

                          </div>

                          <div class="form-row">
                            <div class="form-group col-md-6">
                              <label >Địa điểm</label>
                              <select class="form-control" name="province_id">
                                <option th:each="province : ${provinces}" th:value="${province.id}" th:text="${province.name}" th:selected="${province.id} == ${tour.province.id}"></option>
                              </select>
                            </div>


                          </div>


                          <div class="form-group">
<!--                            <img class="img-thumbnail img-fluid" th:src="@{'api/get-image?url=' + ${tour.thumbnailPath}}"/>-->
                            <label for="inputAddress2">Thumbnail</label>
                            <input type="file" name="thumbnail" th:value="${tour.thumbnailPath}">
                          </div>

                          <div class="form-group">
                            <label for="inputAddress2">Hình ảnh</label>
                            <input type="file" name="images" multiple="multiple">
                          </div>



                        </div>
                        <div class="modal-footer">
                          <button type="button" class="btn btn-secondary" data-dismiss="modal">Đóng</button>
                          <button type="submit" class="btn btn-primary">Sửa</button>
                        </div>
                      </form>
                    </div>
                  </div>
                </div>

                <!-- Button trigger modal -->
                <button type="button" class="btn btn-danger" data-toggle="modal" th:attr="data-target='#xoa'+${tour.id}">
                  Xóa
                </button>

                <!-- Modal -->
                <div class="modal fade" th:id="'xoa' + ${tour.id}" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
                  <div class="modal-dialog" role="document">
                    <div class="modal-content">
                      <div class="modal-header">
                        <h5 class="modal-title" id="xoamodel">Xóa tour</h5>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                          <span aria-hidden="true">&times;</span>
                        </button>
                      </div>

                      <form method="post" action="deleteTour" modelAttribute="province">
                        <input type="hidden"  name="id" th:value="${tour.id}">




                        <div class="modal-body">
                          Bạn có chắc chắn muốn xóa tour này ?

                        </div>
                        <div class="modal-footer">
                          <button type="button" class="btn btn-secondary" data-dismiss="modal">Hủy</button>
                          <button type="submit" class="btn btn-primary">Xóa</button>

                        </div>
                      </form>
                    </div>
                  </div>
                </div>

              </td>
            </tr>

            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</div>

</body>
</html>
