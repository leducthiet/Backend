<body>
<div class="container-fluid " style="height: 100vh; padding: 0;">
  <div th:replace="fragments/headerManager :: header">...</div>

  <div class="row" style="height: 92%; margin: 0;">
    <div th:replace="fragments/sideBarManager :: sidebar">...</div>

    <div class="col" style="border-top: none; box-sizing: border-box;" id="viewcontent">
      <h2 class="mt-3 pb-3 border-bottom mb-3" style="font-weight: 400;">Danh sách Tour</h2>

      <form>
        <input type="hidden" id="sizeOfList" th:value="${#lists.size(tours)}">
      </form>

      <div class="card">
        <div class="card-body">
          <table id="accountTable" class="table table-striped table-bordered table-hover">
            <thead>
            <tr>
              <th style="width: 10%">ID</th>
              <th style="width: 40%">Tên Tour</th>
              <th style="width: 30%">Hình ảnh</th>
              <th style="width: 20%">Hàng động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each ="tour,iter : ${tours}">
              <td th:utext="${tour.id}">...</td>
              <td th:utext="${tour.tourName}">...</td>
              <td> <img class="img-thumbnail" th:src="@{'api/get-image?url=' + ${tour.thumbnailPath}}"/> </td>
              <td>
                <a th:href="@{'tourBookingOfTour?tourId=' + ${tour.id}}" class="btn btn-info text-light mb-1">Xem đơn đặt tour</a><br>
                <a th:href="@{'tourFeedBackOfTour?tourId=' + ${tour.id}}" class="btn btn-primary text-light mb-1">Xem phản hồi từ khách hàng</a><br>

                <button type="button" class="btn btn-warning" data-toggle="modal" th:attr="data-target='#sua'+${tour.id}">Sửa</button>

                <div class="modal fade bd-example-modal-lg" th:id="'sua' + ${tour.id}" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
                  <div class="modal-dialog modal-lg" role="document">
                    <div class="modal-content">
                      <div class="modal-header">
                        <h5 class="modal-title" id="exampleModalLabel1">Sửa Tour</h5>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                          <span aria-hidden="true">&times;</span>
                        </button>
                      </div>


                      <form method="post" action="updateTour" modelAttribute="tour" enctype="multipart/form-data">
                        <input type="hidden" name="id" th:value="${tour.id}">
                        <input type="hidden" name="travelAgencyId" th:value="${tour.travelAgency.id}">
                        <div class="modal-body">
                          <div class="form-row">
                            <div class="form-group col-md-6">
                              <label>Tên tour</label>
                              <input type="text" class="form-control" placeholder="" name="tourName" th:value="${tour.tourName}">
                            </div>
                            <div class="form-group col-md-2">

                            <div class="form-group col-md-4">

                            <input type="file" name="images" multiple="multiple">

                          <div class="form-group">

                            <div class="card mt-3">

                                <div th:id="'map' + ${iter.index}"></div>

                              </div>
                            </div>
                          </div>

                          <div class="form-row">
                            <div class="form-group col-md-4">
                              <input type="text" class="form-control" name="lng" th:id="'lng' + ${iter.index}" th:value="${tour.lng}">
                            </div>

                            <div class="form-group col-md-4">
                              <input type="text" class="form-control" name="lat" th:id="'lat' + ${iter.index}" id="lat" th:value="${tour.lat}">
                            </div>


                          </div>


                        </div>
                        <div class="modal-footer">

                      </form>
                    </div>
                  </div>
                </div>

                <!-- Button trigger modal -->
                <button type="button" class="btn btn-danger" data-toggle="modal" th:attr="data-target='#xoa'+${tour.id}">

                </button>

                <div class="modal fade" th:id="'xoa' + ${tour.id}" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">

                      </div>

                        </div>
                        <div class="modal-footer">
                          <button type="button" class="btn btn-secondary" data-dismiss="modal">Hủy</button>
                          <button type="submit" class="btn btn-primary">Xóa</button>

                      </form>
                    </div>
                  </div>
                </div>

            </tr>

            </tbody>
          </table>
        </div>
      </div>
