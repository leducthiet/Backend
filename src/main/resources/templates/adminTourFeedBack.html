<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/c7788420e7.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.1/css/dataTables.bootstrap4.min.css">

    <script src="https://cdn.datatables.net/1.13.1/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.1/js/dataTables.bootstrap4.min.js"></script>
</head>
<body>
<div class="container-fluid " style="height: 100vh; padding: 0;">
    <div th:replace="fragments/headerAdmin :: header">...</div>

    <div class="row" style="height: 92%; margin: 0;">
        <div th:replace="fragments/sideBarAdmin :: sidebar">...</div>

        <div class="col" style="border-top: none; box-sizing: border-box;" id="viewcontent">
            <h2 class="mt-3 pb-3 border-bottom mb-3" style="font-weight: 400;">Danh sách phản hồi từ khách hàng</h2>

            <div class="card">
                <div class="card-body">
                    <table id="accountTable" class="table table-striped table-bordered table-hover">
                        <thead>
                        <tr>
                            <th style="width: 10%">ID</th>
                            <th style="width: 20%">Tên khách hàng</th>
                            <th style="width: 10%">Điểm đánh giá</th>
                            <th style="width: 40%">Nhận xét</th>
                            <th style="width: 20%">Hàng động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each ="feedBack : ${feedBacks}">
                            <td th:utext="${feedBack.id}">...</td>
                            <td th:utext="${feedBack.users.name}">...</td>
                            <td th:utext="${feedBack.rating}">...</td>
                            <td th:utext="${feedBack.comment}">...</td>
                            <td>
                                <button th:unless="${feedBack.isHidden}" type="button" class="btn btn-dark" data-toggle="modal" th:attr="data-target='#sua'+${feedBack.id}">Ẩn phản hồi</button>

                                <!-- Modal -->
                                <div class="modal  fade bd-example-modal-lg"  th:id="'sua' + ${feedBack.id}"  tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
                                    <div class="modal-dialog modal-lg" role="document">
                                        <div class="modal-content">
                                            <div class="modal-header">
                                                <h5 class="modal-title" >Ẩn phản hồi</h5>
                                                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                                    <span aria-hidden="true">&times;</span>
                                                </button>
                                            </div>
                                            <form method="post" action="hideTourFeedBack" modelAttribute="feedBack">
                                                <input type="hidden"  name="id" th:value="${feedBack.id}">

                                                <div class="modal-body">
                                                    Bạn có chắc chắn muốn ẩn phản hồi này ?

                                                </div>
                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Hủy</button>
                                                    <button type="submit" class="btn btn-primary">Ẩn</button>

                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                </div>

                                <button th:if="${feedBack.isHidden}" type="button" class="btn btn-success" data-toggle="modal" th:attr="data-target='#hien'+${feedBack.id}">Hiện phản hồi</button>

                                <!-- Modal -->
                                <div class="modal  fade bd-example-modal-lg"  th:id="'hien' + ${feedBack.id}"  tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
                                    <div class="modal-dialog modal-lg" role="document">
                                        <div class="modal-content">
                                            <div class="modal-header">
                                                <h5 class="modal-title" >Hiện phản hồi</h5>
                                                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                                    <span aria-hidden="true">&times;</span>
                                                </button>
                                            </div>
                                            <form method="post" action="activeTourFeedBack" modelAttribute="feedBack">
                                                <input type="hidden"  name="id" th:value="${feedBack.id}">

                                                <div class="modal-body">
                                                    Bạn có chắc chắn muốn hiện phản hồi này ?

                                                </div>
                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Hủy</button>
                                                    <button type="submit" class="btn btn-primary">Hiện</button>

                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                </div>

                                <!-- Button trigger modal -->
                                <button type="button" class="btn btn-danger" data-toggle="modal" th:attr="data-target='#xoa'+${feedBack.id}">
                                    Xóa
                                </button>

                                <!-- Modal -->
                                <div class="modal fade" th:id="'xoa' + ${feedBack.id}" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
                                    <div class="modal-dialog" role="document">
                                        <div class="modal-content">
                                            <div class="modal-header">
                                                <h5 class="modal-title" id="xoamodel">Xóa phản hồi</h5>
                                                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                                    <span aria-hidden="true">&times;</span>
                                                </button>
                                            </div>

                                            <form method="post" action="deleteTourFeedBack" modelAttribute="feedBack">
                                                <input type="hidden"  name="id" th:value="${feedBack.id}">




                                                <div class="modal-body">
                                                    Bạn có chắc chắn muốn xóa phản hồi này ?

                                                </div>
                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Hủy</button>
                                                    <button type="submit" class="btn btn-primary">Xóa</button>

                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                </div>

                            </td>
                        </tr>

                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="js/dataTable.js"></script>


</body>
</html>
