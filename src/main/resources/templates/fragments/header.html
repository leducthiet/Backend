<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
  <script src="https://kit.fontawesome.com/c7788420e7.js" crossorigin="anonymous"></script>


</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top" th:fragment="header">
  <a class="navbar-brand" href="/tourUser">Du lịch</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarSupportedContent">
    <ul class="navbar-nav mr-auto">
      <li class="nav-item ">
        <a class="nav-link text-light" href="/tourUser">Tour </a>
      </li>
      <li class="nav-item ">
        <a class="nav-link text-light" href="#">Khách sạn</a>
      </li>
      <li class="nav-item ">
        <a class="nav-link text-light" href="/contact">Liên hệ</a>
      </li>

    </ul>



    <ul class="navbar-nav ml-auto d-flex justify-content-end align-items-center">
      <th:block th:if="${session.username}">
        <a href="/viewHistoryOrder" class="mr-3"><i class="fas fa-cart-plus text-light"></i></a>
        <span class="mr-3 text-light" th:text="@{'Welcome ' + ${session.username}}">John Doe</span>
        <li class="nav-item dropdown" style="display: inline; float: right;">
          <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-toggle="dropdown"
             aria-haspopup="true" aria-expanded="false" style="padding: 0;">
            <i class="fa fa-user text-light" aria-hidden="true"></i>
          </a>
          <div class="dropdown-menu dropdown-menu-right" aria-labelledby="dropdownMenuButton">
            <a class="dropdown-item" href="profile.html">
              <i class="fa fa-user" aria-hidden="true"></i>
              Thông tin cá nhân
            </a>
            <a class="dropdown-item" href="/logout2">
              <i class="fas fa-sign-out"></i>
              Đăng xuất
            </a>
          </div>
        </li>
      </th:block>
      <th:block th:unless="${session.username}">
        <a href="/login" class="btn btn-outline-light my-2 my-sm-0 mr-3 text-light" type="submit">Đăng nhập</a>
        <a href="/register" class="btn btn-outline-light my-2 my-sm-0 text-light" type="submit">Đăng ký</a>
      </th:block>

    </ul>
  </div>
</nav>

</body>
</html>
