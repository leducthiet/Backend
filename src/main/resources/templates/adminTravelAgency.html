<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
  <script src="https://kit.fontawesome.com/c7788420e7.js" crossorigin="anonymous"></script>

  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.1/css/dataTables.bootstrap4.min.css">

  <script src="https://cdn.datatables.net/1.13.1/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.1/js/dataTables.bootstrap4.min.js"></script>
</head>
<body>
<div class="container-fluid " style="height: 100vh; padding: 0;">
  <div th:replace="fragments/headerAdmin :: header">...</div>

  <div class="row" style="height: 92%; margin: 0;">
    <div th:replace="fragments/sideBarAdmin :: sidebar">...</div>

    <div class="col" style="border-top: none; box-sizing: border-box;" id="viewcontent">
      <h2 class="mt-3 pb-3 border-bottom mb-3" style="font-weight: 400;">Danh sách đại lý lữ hành</h2>
      <button type="button" class="btn btn-success mb-3" data-toggle="modal" data-target="#exampleModal">Thêm đại lý lữ hành</button>

      <!-- Modal -->
      <div class="modal fade bd-example-modal-lg" id="exampleModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg" role="document">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="exampleModalLabel">Thêm đại lý lữ hành</h5>
              <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                <span aria-hidden="true">&times;</span>
              </button>
            </div>
            <form method="post" action="travelAgency" modelAttribute="travelAgency" enctype="multipart/form-data">

              <div class="modal-body">

                <div class="form-group">
                  <label for="inputEmail4">Tên đại lý lữ hành</label>
                  <input type="text" class="form-control" id="inputEmail4" placeholder="" name="name">
                </div>

                <div class="form-group">
                  <label for="inputAddress">Địa chỉ</label>
                  <input type="text" class="form-control" id="inputAddress" placeholder="" name="address">
                </div>

                <div class="form-row">
                  <div class="form-group col-md-6">
                    <label >Số điện thoại</label>
                    <input type="text" class="form-control" name="phone">
                  </div>

                  <div class="form-group col-md-6">
                    <label >Email</label>
                    <input type="text" class="form-control" name="email">
                  </div>


                </div>


                <div class="form-group">
                  <label for="inputAddress2">Mô tả</label>
                  <input type="text" class="form-control" id="inputAddress2" placeholder="" name="description">
                </div>

                <div class="form-group">
                  <label>Giấy phép kinh doanh</label>
                  <input type="file" name="thumbnail" required>
                </div>

                <div class="form-row">
                  <div class="form-group col-md-6">
                    <label>Gói dịch vụ</label>
                    <select class="form-control" name="product_id">
                      <option disabled selected>--Chọn gói dịch vụ--</option>
                      <option th:each="product : ${products}" th:value="${product.id}" th:text="${product.name}"></option>
                    </select>
                  </div>
                </div>

                <div class="form-group">
                  <label for="inputAddress2">Tên ngân hàng</label>
                  <input type="text" class="form-control" placeholder="" name="bank">
                </div>

                <div class="form-group">
                  <label for="inputAddress2">Số tài khoản</label>
                  <input type="text" class="form-control" placeholder="" name="accountNumber">
                </div>

                <div class="form-group">
                  <label for="inputAddress2">Chủ sở hữu</label>
                  <input type="text" class="form-control" placeholder="" name="accountHolder">
                </div>


              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Đóng</button>
                <button type="submit" class="btn btn-primary">Thêm</button>
              </div>
            </form>

          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <table id="accountTable" class="table table-striped table-bordered table-hover">
            <thead>
            <tr>
              <th style="width: 10%">ID</th>
              <th style="width: 30%">Tên đại lý lữ hành</th>
              <th style="width: 40%">Địa chỉ</th>
              <th style="width: 20%">Hàng động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each ="travelAgency : ${travelAgencies}">
              <td th:utext="${travelAgency.id}">...</td>
              <td th:utext="${travelAgency.name}">...</td>
              <td th:utext="${travelAgency.address}">...</td>
              <td>

                <a th:href="@{'tourOfTravelAgency?travelAgencyId=' + ${travelAgency.id}}" class="btn btn-info text-light mb-1">Xem tour</a><br>

                <button type="button" class="btn btn-warning" data-toggle="modal" th:attr="data-target='#sua'+${travelAgency.id}">Sửa</button>

                <!-- Modal -->
                <div class="modal  fade bd-example-modal-lg"  th:id="'sua' + ${travelAgency.id}"  tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
                  <div class="modal-dialog modal-lg" role="document">
                    <div class="modal-content">
                      <div class="modal-header">
                        <h5 class="modal-title" >Sửa đại lý lữ hành</h5>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                          <span aria-hidden="true">&times;</span>
                        </button>
                      </div>
                      <form method="post" action="updateTravelAgency" modelAttribute="travelAgency" enctype="multipart/form-data">
                        <div class="modal-body">
                          <input type="hidden" name="id" th:value="${travelAgency.id}">
                          <div class="form-group">
                            <label for="inputAddress2">Ngày hết hạn gói dịch vụ</label>
                            <input type="text" class="form-control" placeholder="" th:value="${#dates.format(travelAgency.expiredDate, 'yyyy-MM-dd')}" readonly>
                          </div>
                          <div class="form-group">
                            <label for="inputEmail4">Tên đại lý lữ hành</label>
                            <input type="text" class="form-control" placeholder="" name="name" th:value="${travelAgency.name}">
                          </div>

                          <div class="form-group">
                            <label for="inputAddress">Địa chỉ</label>
                            <input type="text" class="form-control" placeholder="" name="address" th:value="${travelAgency.address}">
                          </div>

                          <div class="form-row">
                            <div class="form-group col-md-6">
                              <label >Số điện thoại</label>
                              <input type="text" class="form-control" name="phone" th:value="${travelAgency.phone}">
                            </div>

                            <div class="form-group col-md-6">
                              <label >Email</label>
                              <input type="text" class="form-control" name="email" th:value="${travelAgency.email}">
                            </div>


                          </div>


                          <div class="form-group">
                            <label for="inputAddress2">Mô tả</label>
                            <input type="text" class="form-control" placeholder="" name="description" th:value="${travelAgency.description}">
                          </div>

                          <div class="form-group">
                            <label>Giấy phép kinh doanh</label>
                            <input type="file" name="thumbnail">
                          </div>

                          <div class="form-row">
                            <div class="form-group col-md-6">
                              <label>Gói dịch vụ</label>
                              <select class="form-control" name="product_id">
                                <option disabled selected>--Chọn gói dịch vụ--</option>
                                <option th:each="product : ${products}" th:value="${product.id}" th:text="${product.name}" th:selected="${product.id} == ${travelAgency.product.id}"></option>
                              </select>
                            </div>
                          </div>

                          <div class="form-group">
                            <label for="inputAddress2">Tên ngân hàng</label>
                            <input type="text" class="form-control" placeholder="" name="bank" th:value="${travelAgency.bank}">
                          </div>

                          <div class="form-group">
                            <label for="inputAddress2">Số tài khoản</label>
                            <input type="text" class="form-control" placeholder="" name="accountNumber" th:value="${travelAgency.accountNumber}">
                          </div>

                          <div class="form-group">
                            <label for="inputAddress2">Chủ sở hữu</label>
                            <input type="text" class="form-control" placeholder="" name="accountHolder" th:value="${travelAgency.accountHolder}">
                          </div>

                        </div>
                        <div class="modal-footer">
                          <button type="button" class="btn btn-secondary" data-dismiss="modal">Đóng</button>
                          <button type="submit" class="btn btn-primary">Sửa</button>
                        </div>
                      </form>
                    </div>
                  </div>
                </div>

                <!-- Button trigger modal -->
                <button type="button" class="btn btn-danger" data-toggle="modal" th:attr="data-target='#xoa'+${travelAgency.id}">
                  Xóa
                </button>

                <!-- Modal -->
                <div class="modal fade" th:id="'xoa' + ${travelAgency.id}" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
                  <div class="modal-dialog" role="document">
                    <div class="modal-content">
                      <div class="modal-header">
                        <h5 class="modal-title" id="xoamodel">Xóa đại lý lữ hành</h5>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                          <span aria-hidden="true">&times;</span>
                        </button>
                      </div>

                      <form method="post" action="deleteTravelAgency" modelAttribute="travelAgency">
                        <input type="hidden"  name="id" th:value="${travelAgency.id}">




                        <div class="modal-body">
                          Bạn có chắc chắn muốn xóa đại lý lữ hành này ?

                        </div>
                        <div class="modal-footer">
                          <button type="button" class="btn btn-secondary" data-dismiss="modal">Hủy</button>
                          <button type="submit" class="btn btn-primary">Xóa</button>

                        </div>
                      </form>
                    </div>
                  </div>
                </div>


              </td>
            </tr>

            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
    $(document).ready(function () {
        $('#accountTable').DataTable({
            lengthMenu: [
                [2, 5, 10, -1],
                [2, 5, 10, 'All'],
            ],
        });
    });
</script>

</body>
</html>
