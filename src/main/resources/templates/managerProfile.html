<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/c7788420e7.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.1/css/dataTables.bootstrap4.min.css">
</head>
<body>
<div class="container-fluid " style="height: 100vh; padding: 0;">
    <div th:replace="fragments/headerManager :: header">...</div>

    <div class="row" style="height: 92%; margin: 0;">
        <div th:replace="fragments/sideBarManager :: sidebar">...</div>

        <div class="col" style="border-top: none; box-sizing: border-box;" id="viewcontent">
            <h2 class="mt-3 pb-3 border-bottom mb-3" style="font-weight: 400;">Thông tin đại lý lữ hành</h2>

            <nav>
                <div class="nav nav-tabs" id="nav-tab" role="tablist">
                    <a class="nav-item nav-link active" id="nav-home-tab" data-toggle="tab" href="#nav-home" role="tab" aria-controls="nav-home" aria-selected="true">Thông tin tài khoản</a>
                    <a class="nav-item nav-link" id="nav-profile-tab" data-toggle="tab" href="#nav-profile" role="tab" aria-controls="nav-profile" aria-selected="false">Mật khẩu</a>
                </div>
            </nav>
            <div class="tab-content" id="nav-tabContent">
                <div class="tab-pane fade show active" id="nav-home" role="tabpanel" aria-labelledby="nav-home-tab">
                    <div class="card mt-3">
                        <div class="card-body">
                            <form method="post" action="updateTravelAgencyProfile" modelAttribute="travelAgency" enctype="multipart/form-data">
                                <input type="hidden" name="id" th:value="${travelAgency.id}">
                                <input type="hidden" name="product_id" th:value="${travelAgency.product.id}">
                                <div class="form-group">
                                    <label>Ngày hết hạn gói dịch vụ</label>
                                    <input type="text" class="form-control" placeholder="" th:value="${#dates.format(travelAgency.expiredDate, 'yyyy-MM-dd')}" readonly>
                                </div>
                                <div class="form-group">
                                    <label>Tên đại lý lữ hành</label>
                                    <input type="text" class="form-control" placeholder="" name="name" th:value="${travelAgency.name}">
                                </div>

                                <div class="form-group">
                                    <label>Địa chỉ</label>
                                    <input type="text" class="form-control" placeholder="" name="address" th:value="${travelAgency.address}">
                                </div>

                                <div class="form-row">
                                    <div class="form-group col-md-6">
                                        <label >Số điện thoại</label>
                                        <input type="text" class="form-control" name="phone" th:value="${travelAgency.phone}">
                                    </div>

                                    <div class="form-group col-md-6">
                                        <label >Email</label>
                                        <input type="text" class="form-control" name="email" th:value="${travelAgency.email}">
                                    </div>


                                </div>


                                <div class="form-group">
                                    <label>Mô tả</label>
                                    <input type="text" class="form-control" placeholder="" name="description" th:value="${travelAgency.description}">
                                </div>

                                <div class="form-group">
                                    <label>Giấy phép kinh doanh</label>
                                    <input type="file" name="thumbnail">
                                </div>

                                <div class="form-row">
                                    <div class="form-group col-md-6">
                                        <label>Gói dịch vụ</label>
                                        <input type="text" class="form-control" placeholder="" th:value="${travelAgency.product.name}" readonly>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label>Tên ngân hàng</label>
                                    <input type="text" class="form-control" placeholder="" name="bank" th:value="${travelAgency.bank}">
                                </div>

                                <div class="form-group">
                                    <label>Số tài khoản</label>
                                    <input type="text" class="form-control" placeholder="" name="accountNumber" th:value="${travelAgency.accountNumber}">
                                </div>

                                <div class="form-group">
                                    <label>Chủ sở hữu</label>
                                    <input type="text" class="form-control" placeholder="" name="accountHolder" th:value="${travelAgency.accountHolder}">
                                </div>

                                <div class="form-group">
                                    <label>Mã tài khoản Paypal</label>
                                    <input type="text" class="form-control" placeholder="" name="paypalId" th:value="${travelAgency.paypalId}">
                                </div>

                                <button type="submit" class="btn btn-primary">Lưu</button>
                                <button type="button" class="btn btn-success" data-toggle="modal" data-target="#exampleModal">Gia hạn gói dịch vụ</button>


                            </form>


                            <!-- Modal -->
                            <div class="modal fade bd-example-modal-lg" id="exampleModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
                                <div class="modal-dialog modal-lg" role="document">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <h5 class="modal-title" id="exampleModalLabel">Gia hạn gói dịch vụ</h5>
                                            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                                <span aria-hidden="true">&times;</span>
                                            </button>
                                        </div>
                                        <form method="post" action="payService" modelAttribute="travelAgency">
                                            <input type="hidden" name="travelAgencyId" th:value="${travelAgency.id}">
                                            <div class="modal-body">

                                                <div class="form-group">
                                                    <label for="inputEmail4">Số tháng gia hạn</label>
                                                    <input type="text" class="form-control" id="inputEmail4" placeholder="" name="month">
                                                </div>

                                            </div>
                                            <div class="modal-footer">
                                                <button type="button" class="btn btn-secondary" data-dismiss="modal">Đóng</button>
                                                <button type="submit" class="btn btn-primary">OK</button>
                                            </div>
                                        </form>

                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="tab-pane fade" id="nav-profile" role="tabpanel" aria-labelledby="nav-profile-tab">
                    <div class="card mt-3">
                        <div class="card-body">
                            <form method="post" action="changePasswordManager" modelAttribute="account">
                                <input type="hidden"  name="id" th:value="${account.id}">



                                <div class="form-group row">
                                    <div class="col-sm-6">
                                        <label>Mật khẩu hiện tại</label>
                                        <input type="password" class="form-control" name="currentPassword">
                                    </div>
                                </div>
                                <div class="form-group row">
                                    <div class="col-sm-6">
                                        <label>Mật khẩu mới</label>
                                        <input type="password" class="form-control" name="password">
                                    </div>
                                </div>
                                <div class="form-group row">
                                    <div class="col-sm-6">
                                        <label>Nhập lại mật khẩu mới</label>
                                        <input type="password" class="form-control">
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary mt-3">Lưu</button>
                            </form>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
