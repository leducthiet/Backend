<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
  <script src="https://kit.fontawesome.com/c7788420e7.js" crossorigin="anonymous"></script>


</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
    <a class="navbar-brand" href="/tourUser">Du lịch</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav mr-auto">
        <li class="nav-item ">
          <a class="nav-link" href="/tourUser">Tour </a>
        </li>
        <li class="nav-item ">
          <a class="nav-link" href="#">Khách sạn</a>
        </li>

      </ul>
      <form class="form-inline my-2 my-lg-0">
        <input class="form-control mr-sm-2" type="search" placeholder="Tìm kiếm" aria-label="Search">
        <button class="btn btn-outline-light my-2 my-sm-0" type="submit">Tìm kiếm</button>
      </form>
    </div>
  </nav>

  <div class="container mt-3 pt-5">
    <div class="row">
      <div class="col-8">
        <div class="card mt-3 ">
          <div class="card-header">
            <h5 th:text="${tour.tourName}"></h5>
          </div>
          <div class="card-body">
            <div id="carouselExampleControls" class="carousel slide" data-ride="carousel">
              <div class="carousel-inner">

                  <div  class="carousel-item" th:each ="tourImage,iter : ${tourImages}" th:classappend="${iter.first} ? 'active' : ''">
                    <img class="d-block w-100" th:src="@{'http://localhost:8080/api/get-image?url=' + ${tourImage.imagePath}}" alt="First slide" style="width: 100%;height: 30vw;object-fit: cover;">

                  </div>



              </div>
              <a class="carousel-control-prev" href="#carouselExampleControls" role="button" data-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="sr-only">Previous</span>
              </a>
              <a class="carousel-control-next" href="#carouselExampleControls" role="button" data-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="sr-only">Next</span>
              </a>
            </div>
          </div>
        </div>
      </div>

      <div class="col-4" style="padding-left:0px">
        <div class="card mt-3 ">
          <div class="card-header">
            <h5 > Chi tiết</h5>
          </div>
          <div class="card-body">
            <div style="width: 100%;height: 30vw;" >
              <h6>Thời gian : <span th:text="${tour.duration}"></span> ngày</h6>
              <h6>Cho phép tối đa : <span th:text="${tour.totalPeople}"></span> khách</h6>
              <h6>Vé người lớn : <span class="h4 text-primary" th:text="${tour.priceAdult}"></span> VNĐ</h6>
              <h6>Vé trẻ em 5-11 tuổi : <span class="h4 text-primary" th:text="${tour.priceChild5To11}"></span> VNĐ</h6>
              <h6>Vé trẻ em dưới 5 tuổi : <span class="h4 text-primary" th:text="${tour.priceChild2To5}"></span> VNĐ</h6>
              <a th:href="@{'/tourOrder/' + ${tour.id}}" class="btn btn-primary btn-lg btn-block text-light">Đặt ngay</a>
            </div>

          </div>
        </div>
      </div>
    </div>

    <div>
      <div class="row">
        <div class="col-12">
          <div class="card mt-3 ">

            <div class="card-body" style="width: 100%;height: 30vw;">
              <nav>
                <div class="nav nav-tabs" id="nav-tab" role="tablist">
                  <a class="nav-item nav-link active" id="nav-home-tab" data-toggle="tab" href="#nav-home" role="tab" aria-controls="nav-home" aria-selected="true">Điểm nổi bật</a>
                  <a class="nav-item nav-link" id="nav-profile-tab" data-toggle="tab" href="#nav-profile" role="tab" aria-controls="nav-profile" aria-selected="false">Lịch trình</a>

                </div>
              </nav>
              <div class="tab-content" id="nav-tabContent">
                <div class="tab-pane fade show active" id="nav-home" role="tabpanel" aria-labelledby="nav-home-tab">
                          <div class="mt-3" th:utext="${tour.description}"></div>
                </div>
                <div class="tab-pane fade" id="nav-profile" role="tabpanel" aria-labelledby="nav-profile-tab">

                          <div class="mt-3" th:utext="${tour.schedule}"></div>

                </div>

              </div>
            </div>
          </div>
        </div>

      </div>







  </div>
  </div>
</body>
</html>
