<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
  <script src="https://kit.fontawesome.com/c7788420e7.js" crossorigin="anonymous"></script>



</head>
<body>
  <div th:replace="fragments/header :: header">...</div>

  <div class="container-fluid mt-3 pt-5">
    <div class="row">
      <div class="col-3">
        <div class="card mt-3">
          <div class="card-body">
            <form action="SearchManyCondition">
              <div class="form-group">
                <label >Từ khóa tìm kiếm</label>
                <input type="text" class="form-control" name="keyword" id="inputAddress" placeholder="Nhập từ khóa" th:value="${keyword}">
              </div>
              <div class="form-row">
                <div class="form-group col-md-12">
                  <label >Chủ đề</label>
                  <select class="form-control" id="tourType" name="tourType_id">
                    <option selected value="-1">--Chọn chủ đề--</option>
                    <option th:each="tourType : ${tourTypes}" th:value="${tourType.id}" th:text="${tourType.name}"></option>
                  </select>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group col">
                  <label >Địa điểm</label>
                  <select class="form-control" id="province" name="province_id">
                    <option selected value="-1">--Chọn địa điểm--</option>
                    <option th:each="province : ${provinces}" th:value="${province.id}" th:text="${province.name}"></option>
                  </select>
                </div>


              </div>



              <button type="submit" class="btn btn-primary">Tìm kiếm</button>
            </form>
          </div>
        </div>
      </div>
      <div class="col-9">
        <div class="card mt-3">
          <div class="card-body">
            <div class="row">
              <div class="col-sm-4 mb-3" th:each ="tour : ${tours}">
                <div class="card">
                  <div class="card-body">
                    <img class="img-thumbnail card-img-tour" th:src="@{'api/get-image?url=' + ${tour.thumbnailPath}}" style="width: 100%;height: 15vw;object-fit: cover;"/>
                    <p class="card-title font-weight-bold" th:utext="${tour.tourName}">...</p>
                    <a th:href="@{'/tourDetail/' + ${tour.id}}" class="btn btn-primary" th:utext="${tour.priceAdult} + ' VNĐ'">...</a>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>

  </div>





</body>
</html>
