<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/c7788420e7.js" crossorigin="anonymous"></script>



</head>
<body>
    <div th:replace="fragments/header :: header">...</div>

    <div class="container mt-3 pt-5">
        <div class="card mt-3">
            <div class="card-header">
                <h5>Các tour theo địa điểm</h5>
            </div>
            <div class="card-body">
                <div>

                    <ul class="nav nav-pills mb-3" id="pills-tab" role="tablist">
                        <li class="nav-item">
                            <a class="nav-link active" id="pills-all-tab" data-toggle="pill" href="#pills-all" role="tab" aria-controls="pills-all" aria-selected="true">Tất cả</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link " id="pills-home-tab" data-toggle="pill" href="#pills-home" role="tab" aria-controls="pills-home" aria-selected="false" th:text="${provinces[0].name}">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="pills-profile-tab" data-toggle="pill" href="#pills-profile" role="tab" aria-controls="pills-profile" aria-selected="false" th:text="${provinces[1].name}">Profile</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="pills-contact-tab" data-toggle="pill" href="#pills-contact" role="tab" aria-controls="pills-contact" aria-selected="false" th:text="${provinces[2].name}">Contact</a>
                        </li>
                    </ul>
                    <div class="tab-content" id="pills-tabContent">
                        <div class="tab-pane fade show active" id="pills-all" role="tabpanel" aria-labelledby="pills-all-tab">
                            <div class="row">
                                <div class="col-sm-4 mb-3" th:each ="tour : ${tours}">
                                    <div class="card">
                                        <div class="card-body">
                                            <img class="img-thumbnail card-img-tour" th:src="@{'api/get-image?url=' + ${tour.thumbnailPath}}" style="width: 100%;height: 15vw;object-fit: cover;"/>
                                            <p class="card-title font-weight-bold" th:utext="${tour.tourName}">...</p>
                                            <a th:href="@{'/tourDetail/' + ${tour.id}}" class="btn btn-primary" th:utext="${tour.priceAdult} + ' VNĐ'">...</a>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                        <div class="tab-pane fade" id="pills-home" role="tabpanel" aria-labelledby="pills-home-tab">
                            <div class="row">
                                <div class="col-sm-4  mb-3" th:each ="tour : ${tours1}">
                                    <div class="card">
                                        <div class="card-body">
                                            <img class="img-thumbnail card-img-tour" th:src="@{'api/get-image?url=' + ${tour.thumbnailPath}}" style="width: 100%;height: 15vw;object-fit: cover;"/>
                                            <p class="card-title font-weight-bold" th:utext="${tour.tourName}">...</p>
                                            <a th:href="@{'/tourDetail/' + ${tour.id}}" class="btn btn-primary" th:utext="${tour.priceAdult} + ' VNĐ'">...</a>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                        <div class="tab-pane fade" id="pills-profile" role="tabpanel" aria-labelledby="pills-profile-tab">
                            <div class="row">
                                <div class="col-sm-4 mb-3" th:each ="tour : ${tours2}">
                                    <div class="card">
                                        <div class="card-body">
                                            <img class="img-thumbnail card-img-tour" th:src="@{'api/get-image?url=' + ${tour.thumbnailPath}}" style="width: 100%;height: 15vw;object-fit: cover;"/>
                                            <p class="card-title font-weight-bold" th:utext="${tour.tourName}">...</p>
                                            <a th:href="@{'/tourDetail/' + ${tour.id}}" class="btn btn-primary" th:utext="${tour.priceAdult} + ' VNĐ'">...</a>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                        <div class="tab-pane fade" id="pills-contact" role="tabpanel" aria-labelledby="pills-contact-tab">
                            <div class="row">
                                <div class="col-sm-4 mb-3" th:each ="tour : ${tours3}">
                                    <div class="card">
                                        <div class="card-body">
                                            <img class="img-thumbnail card-img-tour" th:src="@{'api/get-image?url=' + ${tour.thumbnailPath}}" style="width: 100%;height: 15vw;object-fit: cover;"/>
                                            <p class="card-title font-weight-bold" th:utext="${tour.tourName}">...</p>
                                            <a th:href="@{'/tourDetail/' + ${tour.id}}" class="btn btn-primary" th:utext="${tour.priceAdult} + ' VNĐ'">...</a>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>


            </div>


        </div>




</body>
</html>
